<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario cerrado</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            max-width: 600px;
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0,0,0,.12);
            text-align: center;
        }

        h1 {
            color: #003E7E;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
        }

        .estado {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #f8d7da;
            color: #842029;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="estado">Formulario cerrado</div>

    <h1>El período de recepción de solicitudes ha finalizado</h1>

    <p>
        Este formulario ya no se encuentra disponible y no es posible enviar nuevas solicitudes.
    </p>

    <p>
        Si tienes alguna consulta, por favor comunícate con Paula Videla (pvidela@uandes.cl).
    </p>

</div>

</body>
</html>
